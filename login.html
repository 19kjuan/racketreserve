<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔐 Acceso Entrenador - Racket Reserve</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="login-container">
            <header class="login-header">
                <h1>🎾 Racket Reserve</h1>
                <p class="login-subtitle">Acceso para Entrenadores</p>
            </header>

            <main class="login-main">
                <div class="login-form-container">
                    <form id="loginForm" class="login-form">
                        <div class="form-group">
                            <label for="email">📧 Correo Electrónico</label>
                            <input 
                                type="email" 
                                id="email" 
                                name="email" 
                                placeholder="jesusdaza@racketreserve.com" 
                                required 
                                autocomplete="email"
                            />
                        </div>

                        <div class="form-group">
                            <label for="password">🔒 Contraseña</label>
                            <input 
                                type="password" 
                                id="password" 
                                name="password" 
                                placeholder="Ingresa tu contraseña" 
                                required 
                                autocomplete="current-password"
                            />
                        </div>

                        <div class="form-actions">
                            <button type="submit" class="btn-primary btn-full">
                                🔐 Iniciar Sesión
                            </button>
                        </div>
                    </form>

                    <div class="login-info">
                        <div class="info-card">
                            <h3>👨‍🏫 ¿Eres entrenador?</h3>
                            <p>Usa tus credenciales para acceder al panel de administración y gestionar las reservas de clases de tenis.</p>
                        </div>
                        
                        <div class="back-link">
                            <a href="index.html" class="btn-secondary">
                                ← Volver a Reservas
                            </a>
                        </div>
                    </div>
                </div>
            </main>

            <div id="notification" class="notification"></div>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
