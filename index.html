<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎾 Reserva de Clases de Tenis - Sistema Profesional</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎾 Reserva de Clases de Tenis</h1>
            <nav>
                <a href="index.html" class="active">📅 Reservar Clase</a>
                <a href="login.html">👨‍🏫 Acceso Entrenador</a>
            </nav>
        </header>

        <main>
            <section class="date-selector">
                <h2>📅 Seleccionar Fecha</h2>
                <input type="date" id="selectedDate" />
            </section>

            <section class="schedule">
                <h2>⏰ Horarios Disponibles</h2>
                
                <div class="time-slots">
                    <div class="morning-slots">
                        <h3>🌅 Mañana (Cancha 3)</h3>
                        <div id="morningSlots"></div>
                    </div>
                    
                    <div class="afternoon-slots">
                        <h3>🌆 Tarde (Cancha 6)</h3>
                        <div id="afternoonSlots"></div>
                    </div>
                </div>
            </section>

            <section class="reservation-form" id="reservationForm" style="display: none;">
                <h2>📝 Completar Reserva</h2>
                <form id="bookingForm">
                    <input type="hidden" id="slotDate" />
                    <input type="hidden" id="slotTime" />
                    <input type="hidden" id="slotCourt" />
                    
                    <div class="form-group">
                        <label for="customerName">👤 Nombre Completo:</label>
                        <input type="text" id="customerName" placeholder="Ingrese su nombre completo" required />
                    </div>
                    
                    <div class="form-group">
                        <label for="customerPhone">📱 Teléfono:</label>
                        <input type="tel" id="customerPhone" placeholder="+34 600 000 000" required />
                    </div>
                    
                    <div class="form-group">
                        <label for="customerEmail">📧 Email:</label>
                        <input type="email" id="customerEmail" placeholder="correo@ejemplo.com" required />
                    </div>
                    
                    <div class="form-actions">
                        <button type="submit" class="btn-primary">✅ Confirmar Reserva</button>
                        <button type="button" class="btn-secondary" onclick="cancelReservation()">❌ Cancelar</button>
                    </div>
                </form>
            </section>
        </main>

        <div id="notification" class="notification"></div>
    </div>

    <!-- Scripts -->
    <script src="supabase.js"></script>
    <script src="script.js"></script>
</body>
</html>
